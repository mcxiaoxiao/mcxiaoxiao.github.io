<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">人、多 Agent 与 LLMAPI 网关协作闭环</title>
  <desc id="desc">一张展示人类方向、多 agent 协作、LLMAPI 网关、模型、工具和资源审计之间关系的闭环图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" x2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .bg { fill: url(#bg); }
      .card { fill: rgba(15,23,42,.78); stroke: rgba(203,213,225,.28); stroke-width: 1.2; }
      .hub { fill: url(#hub); filter: url(#glow); }
      .txt { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; font-weight: 750; font-size: 18px; }
      .sub { fill: #cbd5e1; font-size: 13px; font-weight: 500; }
      .line { fill: none; stroke: #67e8f9; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 10 14; animation: dash 3.6s linear infinite; marker-end: url(#arrow); }
      .line2 { stroke: #a7f3d0; animation-duration: 4.5s; }
      .line3 { stroke: #c4b5fd; animation-duration: 5.2s; }
      .pulse { fill: none; stroke: #bbf7d0; stroke-width: 3; opacity: .75; animation: pulse 2.8s ease-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -96; } }
      @keyframes pulse { 0% { r: 74; opacity: .5; } 100% { r: 132; opacity: 0; } }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#67e8f9"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="560"/>
  <text x="58" y="58" class="txt" style="font-size:34px">人 + 多 Agent + LLMAPI</text>
  <text x="60" y="88" class="sub">agent 负责分工和行动，网关负责模型、key、合规、资源和成本边界。</text>

  <g transform="translate(68 208)">
    <rect class="card" width="190" height="116" rx="18"/>
    <text x="28" y="43" class="txt">人类 Human</text>
    <text x="28" y="71" class="sub">方向 direction · 审美 · review</text>
    <text x="28" y="93" class="sub">最后把质量收回来</text>
  </g>

  <g transform="translate(330 122)">
    <rect class="card" width="178" height="92" rx="16"/>
    <text x="22" y="38" class="txt">调研 Agent</text>
    <text x="22" y="65" class="sub">资料 sources · 事实 facts</text>
  </g>
  <g transform="translate(330 234)">
    <rect class="card" width="178" height="92" rx="16"/>
    <text x="22" y="38" class="txt">开发 Agent</text>
    <text x="22" y="65" class="sub">代码 code · 适配器 adapters</text>
  </g>
  <g transform="translate(330 346)">
    <rect class="card" width="178" height="92" rx="16"/>
    <text x="22" y="38" class="txt">审查 Agent</text>
    <text x="22" y="65" class="sub">测试 tests · 风险 risks</text>
  </g>

  <circle cx="636" cy="280" r="76" class="hub"/>
  <circle cx="636" cy="280" r="76" class="pulse"/>
  <text x="584" y="272" class="txt" style="font-size:22px">LLMAPI</text>
  <text x="580" y="300" class="txt" style="font-size:18px">网关 Gateway</text>

  <g transform="translate(825 110)">
    <rect class="card" width="222" height="92" rx="16"/>
    <text x="24" y="38" class="txt">模型 / MaaS</text>
    <text x="24" y="65" class="sub">路由 route · fallback · 预算</text>
  </g>
  <g transform="translate(825 244)">
    <rect class="card" width="222" height="92" rx="16"/>
    <text x="24" y="38" class="txt">工具 / MCP</text>
    <text x="24" y="65" class="sub">搜索 search · 文件 · workflow</text>
  </g>
  <g transform="translate(825 378)">
    <rect class="card" width="222" height="92" rx="16"/>
    <text x="24" y="38" class="txt">资产 / 审计 Audit</text>
    <text x="24" y="65" class="sub">resource_id · 日志 logs · replay</text>
  </g>

  <path class="line" d="M258 266 C286 198 300 168 330 168"/>
  <path class="line line2" d="M258 280 C292 280 300 280 330 280"/>
  <path class="line line3" d="M258 302 C286 374 302 392 330 392"/>
  <path class="line" d="M508 168 C562 178 592 214 612 232"/>
  <path class="line line2" d="M508 280 C552 280 574 280 560 280"/>
  <path class="line line3" d="M508 392 C562 382 592 346 612 328"/>
  <path class="line" d="M712 246 C766 190 782 160 825 156"/>
  <path class="line line2" d="M712 280 C762 280 784 290 825 290"/>
  <path class="line line3" d="M712 318 C766 386 784 416 825 424"/>
  <path class="line line2" d="M846 470 C652 524 340 488 164 324"/>
</svg>
