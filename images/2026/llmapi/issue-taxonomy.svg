<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">LLM Gateway Issue Taxonomy Sample</title>
  <desc id="desc">A coded sample of 18 public issues from LLM gateway and serving projects, grouped by primary pain point and build locus.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="barA" x1="0" x2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="barB" x1="0" x2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="barC" x1="0" x2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <style>
      .bg { fill: url(#bg); }
      .title { font: 820 30px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font: 620 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; letter-spacing: 0; }
      .h2 { font: 800 19px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; letter-spacing: 0; }
      .label { font: 700 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; letter-spacing: 0; }
      .small { font: 620 11.2px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; letter-spacing: 0; }
      .tiny { font: 600 10.5px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; letter-spacing: 0; }
      .panel { fill: rgba(255,255,255,.88); stroke: rgba(148, 163, 184, .55); stroke-width: 1.1; }
      .track { fill: #e2e8f0; }
      .bar1 { fill: url(#barA); }
      .bar2 { fill: url(#barB); }
      .bar3 { fill: url(#barC); }
      .rule { stroke: #cbd5e1; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="640"/>
  <text x="56" y="54" class="title">Issue 样本编码：LLM 网关的真实摩擦点</text>
  <text x="58" y="82" class="subtitle">n = 18 public issue observations from APIPark, LiteLLM, Higress, New API, Portkey, Bifrost, vLLM, SGLang, llama.cpp. Non-random sample; coded by primary pain point.</text>

  <g transform="translate(56 116)">
    <rect class="panel" width="690" height="444" rx="18"/>
    <text x="24" y="40" class="h2">Primary pain point count / 主要问题分类计数</text>
    <text x="24" y="64" class="tiny">每条 issue 只编码一个 primary category；多标签保存在 CSV。</text>

    <g transform="translate(24 92)">
      <text x="0" y="16" class="label">Provider adapter / schema</text>
      <rect x="202" y="0" width="370" height="20" rx="10" class="track"/>
      <rect x="202" y="0" width="370" height="20" rx="10" class="bar1"/>
      <text x="590" y="16" class="label">5</text>

      <text x="0" y="62" class="label">Streaming / protocol parity</text>
      <rect x="202" y="46" width="370" height="20" rx="10" class="track"/>
      <rect x="202" y="46" width="222" height="20" rx="10" class="bar1"/>
      <text x="590" y="62" class="label">3</text>

      <text x="0" y="108" class="label">Agent context / state</text>
      <rect x="202" y="92" width="370" height="20" rx="10" class="track"/>
      <rect x="202" y="92" width="222" height="20" rx="10" class="bar2"/>
      <text x="590" y="108" class="label">3</text>

      <text x="0" y="154" class="label">Deployment / ops</text>
      <rect x="202" y="138" width="370" height="20" rx="10" class="track"/>
      <rect x="202" y="138" width="148" height="20" rx="10" class="bar2"/>
      <text x="590" y="154" class="label">2</text>

      <text x="0" y="200" class="label">Logging / audit / cost</text>
      <rect x="202" y="184" width="370" height="20" rx="10" class="track"/>
      <rect x="202" y="184" width="148" height="20" rx="10" class="bar3"/>
      <text x="590" y="200" class="label">2</text>

      <text x="0" y="246" class="label">Reliability / routing / key</text>
      <rect x="202" y="230" width="370" height="20" rx="10" class="track"/>
      <rect x="202" y="230" width="148" height="20" rx="10" class="bar3"/>
      <text x="590" y="246" class="label">2</text>

      <text x="0" y="292" class="label">Multimodal / resource</text>
      <rect x="202" y="276" width="370" height="20" rx="10" class="track"/>
      <rect x="202" y="276" width="74" height="20" rx="10" class="bar3"/>
      <text x="590" y="292" class="label">1</text>
    </g>

    <line x1="24" y1="410" x2="666" y2="410" class="rule"/>
    <text x="24" y="430" class="tiny">Interpretation: issue evidence concentrates on adapter fidelity, protocol parity, and agent/tool state; media/resource problems are less frequent in this sample but higher L3 relevance.</text>
  </g>

  <g transform="translate(780 116)">
    <rect class="panel" width="364" height="214" rx="18"/>
    <text x="24" y="40" class="h2">Build locus / 能力归属</text>
    <text x="24" y="64" class="tiny">按 issue 对产品化位置做一阶编码。</text>

    <g transform="translate(24 96)">
      <text x="0" y="16" class="label">Community build-in</text>
      <rect x="154" y="0" width="150" height="18" rx="9" class="track"/>
      <rect x="154" y="0" width="150" height="18" rx="9" class="bar1"/>
      <text x="316" y="15" class="label">10</text>

      <text x="0" y="54" class="label">Self-operated</text>
      <rect x="154" y="38" width="150" height="18" rx="9" class="track"/>
      <rect x="154" y="38" width="75" height="18" rx="9" class="bar3"/>
      <text x="316" y="53" class="label">5</text>

      <text x="0" y="92" class="label">Mixed</text>
      <rect x="154" y="76" width="150" height="18" rx="9" class="track"/>
      <rect x="154" y="76" width="45" height="18" rx="9" class="bar2"/>
      <text x="316" y="91" class="label">3</text>
    </g>
  </g>

  <g transform="translate(780 356)">
    <rect class="panel" width="364" height="204" rx="18"/>
    <text x="24" y="40" class="h2">Reading / 读法</text>
    <text x="24" y="72" class="small">它不能证明“L3 是唯一选择”。</text>
    <text x="24" y="100" class="small">它更谨慎地说明：L1/L2 的高频摩擦</text>
    <text x="24" y="124" class="small">集中在协议保真、部署、日志、agent 状态。</text>
    <text x="24" y="152" class="small">当业务涉及媒体资产和长任务时，</text>
    <text x="24" y="176" class="small">L3 资源化/证据链会更像必要补层。</text>
  </g>

  <text x="58" y="604" class="tiny">Data files: /assets/data/2026/llmapi/issue-taxonomy/llm-gateway-issue-sample.csv, llm-gateway-issue-category-counts.csv, llm-gateway-build-locus-counts.csv</text>
</svg>
