<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Global MaaS and LLMAPI gateway mesh</title>
  <desc id="desc">A speculative global LLM gateway mesh with animated routing links across regions.</desc>
  <defs>
    <radialGradient id="earth" cx="45%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#6ee7f9"/>
      <stop offset="45%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .bg { fill: #020617; }
      .grid { stroke: rgba(148, 163, 184, .18); stroke-width: 1; fill: none; }
      .land { fill: rgba(34, 197, 94, .32); stroke: rgba(187, 247, 208, .46); stroke-width: 1.3; }
      .halo { fill: none; stroke: rgba(56, 189, 248, .2); stroke-width: 14; }
      .orbit { fill: none; stroke: rgba(125, 211, 252, .35); stroke-width: 1.2; }
      .arc { fill: none; stroke: #22d3ee; stroke-width: 3.2; stroke-linecap: round; stroke-dasharray: 12 16; filter: url(#glow); animation: dash 3.2s linear infinite; }
      .arc2 { stroke: #a78bfa; animation-duration: 4.2s; animation-delay: -.7s; }
      .arc3 { stroke: #34d399; animation-duration: 5s; animation-delay: -1.4s; }
      .node { fill: #ecfeff; stroke: #22d3ee; stroke-width: 3; filter: url(#glow); }
      .pulse { fill: none; stroke: #67e8f9; stroke-width: 3; opacity: .75; animation: pulse 2.4s ease-out infinite; }
      .label { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #e5e7eb; font-size: 18px; font-weight: 650; letter-spacing: .2px; }
      .small { fill: #94a3b8; font-size: 13px; font-weight: 500; }
      .badge { fill: rgba(15, 23, 42, .78); stroke: rgba(148, 163, 184, .32); stroke-width: 1; }
      .flowdot { fill: #fef3c7; filter: url(#glow); }
      .flowdot.a { animation: moveA 4s ease-in-out infinite; }
      .flowdot.b { animation: moveB 5s ease-in-out infinite; }
      .flowdot.c { animation: moveC 4.6s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -112; } }
      @keyframes pulse { 0% { r: 8; opacity: .7; } 100% { r: 34; opacity: 0; } }
      @keyframes moveA { 0%,100% { transform: translate(0,0); opacity: .2; } 50% { transform: translate(154px,-54px); opacity: 1; } }
      @keyframes moveB { 0%,100% { transform: translate(0,0); opacity: .15; } 50% { transform: translate(-166px,78px); opacity: 1; } }
      @keyframes moveC { 0%,100% { transform: translate(0,0); opacity: .2; } 50% { transform: translate(84px,140px); opacity: 1; } }
    </style>
  </defs>

  <rect class="bg" width="1200" height="680"/>
  <path class="grid" d="M0 96H1200M0 192H1200M0 288H1200M0 384H1200M0 480H1200M0 576H1200"/>
  <path class="grid" d="M100 0V680M240 0V680M380 0V680M520 0V680M660 0V680M800 0V680M940 0V680M1080 0V680"/>

  <text x="72" y="76" class="label" style="font-size:34px">MaaS / LLMAPI Global Gateway Mesh</text>
  <text x="74" y="106" class="small">像 DNS 一样就近分发，但路由依据从“域名”升级为模型能力、合规边界、成本、延迟和资源归档策略。</text>

  <circle cx="560" cy="356" r="238" class="halo"/>
  <circle cx="560" cy="356" r="218" fill="url(#earth)"/>
  <ellipse cx="560" cy="356" rx="218" ry="72" class="orbit"/>
  <ellipse cx="560" cy="356" rx="218" ry="142" class="orbit"/>
  <path class="orbit" d="M342 356C424 276 497 236 560 236s136 40 218 120"/>
  <path class="orbit" d="M342 356C424 436 497 476 560 476s136-40 218-120"/>
  <path class="orbit" d="M560 138C508 214 482 287 482 356s26 142 78 218"/>
  <path class="orbit" d="M560 138C612 214 638 287 638 356s-26 142-78 218"/>

  <path class="land" d="M411 264c42-42 94-62 138-53 23 5 25 25 7 40-25 21-69 15-91 39-17 19-5 52-26 67-20 14-55-8-62-35-6-25 11-42 34-58z"/>
  <path class="land" d="M587 231c70 2 134 39 160 88 18 35-16 60-57 50-28-7-48-31-77-25-36 8-60 56-93 44-26-10-23-58 2-91 18-23 36-46 65-66z"/>
  <path class="land" d="M485 417c36-15 94-6 112 26 18 31-12 73-51 80-46 8-104-31-102-72 1-17 14-26 41-34z"/>
  <path class="land" d="M665 421c31-24 83-24 112-1 32 25 15 70-27 84-43 14-100-13-105-53-2-13 3-22 20-30z"/>

  <path class="arc" d="M398 320 C330 206 194 188 120 236"/>
  <path class="arc arc2" d="M721 280 C840 156 1010 150 1100 242"/>
  <path class="arc arc3" d="M688 442 C780 556 946 566 1062 486"/>
  <path class="arc" d="M498 516 C426 610 270 586 178 504"/>
  <path class="arc arc2" d="M560 196 C560 118 656 82 758 98"/>
  <path class="arc arc3" d="M390 402 C286 398 210 342 118 360"/>

  <circle cx="398" cy="320" r="8" class="node"/><circle cx="398" cy="320" r="8" class="pulse"/>
  <circle cx="721" cy="280" r="8" class="node"/><circle cx="721" cy="280" r="8" class="pulse" style="animation-delay:.4s"/>
  <circle cx="688" cy="442" r="8" class="node"/><circle cx="688" cy="442" r="8" class="pulse" style="animation-delay:.8s"/>
  <circle cx="498" cy="516" r="8" class="node"/><circle cx="498" cy="516" r="8" class="pulse" style="animation-delay:1.2s"/>
  <circle cx="560" cy="196" r="8" class="node"/><circle cx="560" cy="196" r="8" class="pulse" style="animation-delay:1.6s"/>

  <circle cx="398" cy="320" r="5" class="flowdot a"/>
  <circle cx="721" cy="280" r="5" class="flowdot b"/>
  <circle cx="688" cy="442" r="5" class="flowdot c"/>

  <g transform="translate(86 205)">
    <rect class="badge" width="208" height="86" rx="16"/>
    <text x="18" y="33" class="label">US Edge</text>
    <text x="18" y="58" class="small">low latency / ZDR</text>
  </g>
  <g transform="translate(912 206)">
    <rect class="badge" width="218" height="86" rx="16"/>
    <text x="18" y="33" class="label">EU Edge</text>
    <text x="18" y="58" class="small">AI Act / GDPR policy</text>
  </g>
  <g transform="translate(900 468)">
    <rect class="badge" width="232" height="86" rx="16"/>
    <text x="18" y="33" class="label">CN / APAC Edge</text>
    <text x="18" y="58" class="small">备案 / 内容安全 / 存储</text>
  </g>
  <g transform="translate(92 480)">
    <rect class="badge" width="240" height="92" rx="16"/>
    <text x="18" y="34" class="label">Origin Control Plane</text>
    <text x="18" y="61" class="small">policy · routing · audit · cost</text>
  </g>
  <g transform="translate(802 82)">
    <rect class="badge" width="294" height="92" rx="18"/>
    <text x="18" y="35" class="label">DNS-like Model Routing</text>
    <text x="18" y="62" class="small">model capability + region + budget + risk</text>
  </g>
</svg>
