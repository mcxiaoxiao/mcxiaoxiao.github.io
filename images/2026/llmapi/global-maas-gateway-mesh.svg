<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">全球 LLM 区域需求综合代理指数</title>
  <desc id="desc">多源综合估算 2025-2026 年全球 LLM 与 MaaS 区域需求强度。该图不是全球 token 消耗真值。</desc>
  <defs>
    <linearGradient id="barAsia" x1="0" x2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0" x2="1">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0" x2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="barWarm" x1="0" x2="1">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <style>
      .bg { fill: #ffffff; }
      .band { fill: #f8fafc; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .title { font: 820 30px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font: 620 12.5px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; letter-spacing: 0; }
      .h2 { font: 800 19px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; letter-spacing: 0; }
      .label { font: 720 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; letter-spacing: 0; }
      .small { font: 620 11.5px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; letter-spacing: 0; }
      .tiny { font: 600 10.4px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; letter-spacing: 0; }
      .num { font: 820 25px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; letter-spacing: 0; }
      .score { font: 800 16px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; letter-spacing: 0; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .card { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.1; }
      .track { fill: #e2e8f0; }
      .asia { fill: url(#barAsia); }
      .blue { fill: url(#barBlue); }
      .green { fill: url(#barGreen); }
      .warm { fill: url(#barWarm); }
      .rule { stroke: #e2e8f0; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720"/>
  <rect class="band" y="0" width="1200" height="118"/>
  <path class="grid" d="M44 638H1156M44 118H1156"/>

  <text x="44" y="48" class="title">全球 LLM 需求综合代理 / Regional LLM Demand Proxy</text>
  <text x="46" y="78" class="subtitle">口径：2025-2026 公开资料综合估算；用户规模、GenAI 流量、Claude.ai usage_count、AI 供给侧与 readiness 加权归一化，不是全球 token 账单。</text>

  <g transform="translate(44 140)">
    <rect class="card" width="348" height="92" rx="14"/>
    <text x="22" y="30" class="small">最高需求带 Top band</text>
    <text x="22" y="64" class="num">东亚 East Asia · 100</text>
    <rect x="0" y="0" width="6" height="92" rx="3" class="asia"/>
  </g>
  <g transform="translate(426 140)">
    <rect class="card" width="348" height="92" rx="14"/>
    <text x="22" y="30" class="small">模型/API 供给中心 Supply hub</text>
    <text x="22" y="64" class="num">北美 North America · 95</text>
    <rect x="0" y="0" width="6" height="92" rx="3" class="blue"/>
  </g>
  <g transform="translate(808 140)">
    <rect class="card" width="348" height="92" rx="14"/>
    <text x="22" y="30" class="small">治理与企业市场 Governance market</text>
    <text x="22" y="64" class="num">欧洲 Europe · 72</text>
    <rect x="0" y="0" width="6" height="92" rx="3" class="green"/>
  </g>

  <g transform="translate(44 260)">
    <rect class="panel" width="704" height="342" rx="18"/>
    <text x="24" y="38" class="h2">区域需求指数 / Demand Index (0-100)</text>
    <text x="24" y="60" class="tiny">指数用于相对比较，不能换算为 token 数；完整公式见 PDF 附录。</text>

    <g transform="translate(24 84)">
      <text x="0" y="15" class="label">东亚 East Asia</text>
      <rect x="170" y="0" width="420" height="18" rx="9" class="track"/>
      <rect x="170" y="0" width="420" height="18" rx="9" class="asia"/>
      <text x="610" y="15" class="score">100</text>

      <text x="0" y="45" class="label">北美 North America</text>
      <rect x="170" y="30" width="420" height="18" rx="9" class="track"/>
      <rect x="170" y="30" width="399" height="18" rx="9" class="blue"/>
      <text x="610" y="45" class="score">95</text>

      <text x="0" y="75" class="label">欧洲 Europe</text>
      <rect x="170" y="60" width="420" height="18" rx="9" class="track"/>
      <rect x="170" y="60" width="302" height="18" rx="9" class="green"/>
      <text x="610" y="75" class="score">72</text>

      <text x="0" y="105" class="label">南亚 South Asia</text>
      <rect x="170" y="90" width="420" height="18" rx="9" class="track"/>
      <rect x="170" y="90" width="260" height="18" rx="9" class="warm"/>
      <text x="610" y="105" class="score">62</text>

      <text x="0" y="135" class="label">东南亚 SEA</text>
      <rect x="170" y="120" width="420" height="18" rx="9" class="track"/>
      <rect x="170" y="120" width="202" height="18" rx="9" class="warm"/>
      <text x="610" y="135" class="score">48</text>

      <text x="0" y="165" class="label">拉美 LatAm</text>
      <rect x="170" y="150" width="420" height="18" rx="9" class="track"/>
      <rect x="170" y="150" width="176" height="18" rx="9" class="warm"/>
      <text x="610" y="165" class="score">42</text>

      <text x="0" y="195" class="label">中东 MENA</text>
      <rect x="170" y="180" width="420" height="18" rx="9" class="track"/>
      <rect x="170" y="180" width="134" height="18" rx="9" class="warm"/>
      <text x="610" y="195" class="score">32</text>

      <text x="0" y="225" class="label">非洲 Africa</text>
      <rect x="170" y="210" width="420" height="18" rx="9" class="track"/>
      <rect x="170" y="210" width="101" height="18" rx="9" class="warm"/>
      <text x="610" y="225" class="score">24</text>

      <text x="0" y="255" class="label">大洋洲 Oceania</text>
      <rect x="170" y="240" width="420" height="18" rx="9" class="track"/>
      <rect x="170" y="240" width="76" height="18" rx="9" class="warm"/>
      <text x="610" y="255" class="score">18</text>
    </g>
  </g>

  <g transform="translate(776 260)">
    <rect class="panel" width="380" height="342" rx="18"/>
    <text x="24" y="38" class="h2">证据栈 / Evidence stack</text>
    <text x="24" y="60" class="tiny">权重用于综合 proxy，避免单一厂商覆盖偏差。</text>

    <g transform="translate(24 86)">
      <text x="0" y="14" class="small">用户规模 adoption</text>
      <rect x="158" y="0" width="150" height="16" rx="8" class="track"/>
      <rect x="158" y="0" width="113" height="16" rx="8" class="asia"/>
      <text x="320" y="14" class="tiny">30%</text>

      <text x="0" y="44" class="small">GenAI 流量 traffic</text>
      <rect x="158" y="30" width="150" height="16" rx="8" class="track"/>
      <rect x="158" y="30" width="94" height="16" rx="8" class="blue"/>
      <text x="320" y="44" class="tiny">25%</text>

      <text x="0" y="74" class="small">Claude usage 代理</text>
      <rect x="158" y="60" width="150" height="16" rx="8" class="track"/>
      <rect x="158" y="60" width="56" height="16" rx="8" class="green"/>
      <text x="320" y="74" class="tiny">15%</text>

      <text x="0" y="104" class="small">供给侧 infra / models</text>
      <rect x="158" y="90" width="150" height="16" rx="8" class="track"/>
      <rect x="158" y="90" width="56" height="16" rx="8" class="warm"/>
      <text x="320" y="104" class="tiny">15%</text>

      <text x="0" y="134" class="small">readiness / regulation</text>
      <rect x="158" y="120" width="150" height="16" rx="8" class="track"/>
      <rect x="158" y="120" width="38" height="16" rx="8" class="blue"/>
      <text x="320" y="134" class="tiny">10%</text>

      <text x="0" y="164" class="small">质性校正 qualitative</text>
      <rect x="158" y="150" width="150" height="16" rx="8" class="track"/>
      <rect x="158" y="150" width="19" height="16" rx="8" class="asia"/>
      <text x="320" y="164" class="tiny">5%</text>
    </g>

    <line x1="24" y1="282" x2="356" y2="282" class="rule"/>
    <text x="24" y="306" class="small">说明：Claude 数据只是观测点；中国本地 MaaS、</text>
    <text x="24" y="326" class="small">本地工具流量与供给侧资料用于补足覆盖盲区。</text>
  </g>

  <g transform="translate(44 630)">
    <rect class="card" width="1112" height="48" rx="14"/>
    <text x="18" y="21" class="small">读图方式：它回答“LLMAPI 网关要把哪些区域、合规、路由、成本、存储和多模态资源当成核心变量”。</text>
    <text x="18" y="38" class="tiny">Sources: Anthropic Economic Index, World Bank GenAI traffic paper/package, Microsoft AI Diffusion, CNNIC, Stanford AI Index/Vibrancy, WIPO, Oxford Insights, ITU.</text>
  </g>
</svg>
