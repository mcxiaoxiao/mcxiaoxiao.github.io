<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">LLMAPI control plane</title>
  <desc id="desc">A layered control-plane diagram for LLMAPI gateway execution.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1120"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity=".35"/>
    </filter>
    <style>
      .bg { fill: url(#bg); }
      .card { fill: url(#card); stroke: rgba(148,163,184,.35); stroke-width: 1.2; filter: url(#soft); }
      .core { fill: rgba(8,145,178,.16); stroke: #67e8f9; stroke-width: 2; }
      .line { stroke: url(#accent); stroke-width: 3; fill: none; stroke-linecap: round; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 12; animation: move 3s linear infinite; }
      .txt { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; font-weight: 700; font-size: 18px; }
      .sub { fill: #cbd5e1; font-size: 13px; font-weight: 500; }
      .mini { fill: #93c5fd; font-size: 12px; font-weight: 600; }
      .chip { fill: rgba(15,23,42,.75); stroke: rgba(125,211,252,.35); }
      @keyframes move { to { stroke-dashoffset: -80; } }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#67e8f9"/>
    </marker>
  </defs>

  <rect class="bg" width="1120" height="620"/>
  <text x="58" y="62" class="txt" style="font-size:34px">LLMAPI as an Execution Control Plane</text>
  <text x="60" y="92" class="sub">不是只代理 HTTP，而是把模型调用、任务生命周期、资源入库、审计和统计收拢成一个可治理的执行面。</text>

  <g transform="translate(64 144)">
    <rect class="card" width="220" height="116" rx="18"/>
    <text x="24" y="38" class="txt">Client API</text>
    <text x="24" y="66" class="sub">model_id + params</text>
    <text x="24" y="88" class="sub">wait_result / watch_result</text>
  </g>

  <g transform="translate(64 362)">
    <rect class="card" width="220" height="116" rx="18"/>
    <text x="24" y="38" class="txt">Runtime Config</text>
    <text x="24" y="66" class="sub">model instance / key / URL</text>
    <text x="24" y="88" class="sub">Redis cache + DB source</text>
  </g>

  <g transform="translate(384 176)">
    <rect class="core" width="352" height="264" rx="26"/>
    <text x="40" y="48" class="txt" style="font-size:28px">Gateway Core</text>
    <text x="42" y="82" class="sub">Adapter Registry · Policy · Key Pool</text>
    <g transform="translate(42 112)">
      <rect class="chip" width="120" height="38" rx="10"/><text x="20" y="25" class="mini">request_response</text>
      <rect class="chip" x="138" width="104" height="38" rx="10"/><text x="158" y="25" class="mini">submit_poll</text>
      <rect class="chip" x="260" width="82" height="38" rx="10"/><text x="276" y="25" class="mini">stream</text>
    </g>
    <g transform="translate(42 170)">
      <rect class="chip" width="132" height="38" rx="10"/><text x="20" y="25" class="mini">key cooldown</text>
      <rect class="chip" x="150" width="92" height="38" rx="10"/><text x="170" y="25" class="mini">retry</text>
      <rect class="chip" x="260" width="82" height="38" rx="10"/><text x="276" y="25" class="mini">audit</text>
    </g>
  </g>

  <g transform="translate(850 112)">
    <rect class="card" width="220" height="112" rx="18"/>
    <text x="24" y="38" class="txt">MaaS / Provider</text>
    <text x="24" y="66" class="sub">OpenAI-compatible</text>
    <text x="24" y="88" class="sub">domestic cloud / self-host</text>
  </g>
  <g transform="translate(850 292)">
    <rect class="card" width="220" height="112" rx="18"/>
    <text x="24" y="38" class="txt">Resources</text>
    <text x="24" y="66" class="sub">remote URL / base64 / bytes</text>
    <text x="24" y="88" class="sub">S3 + resources table</text>
  </g>
  <g transform="translate(850 466)">
    <rect class="card" width="220" height="112" rx="18"/>
    <text x="24" y="38" class="txt">Observability</text>
    <text x="24" y="66" class="sub">runtime / audit / payload</text>
    <text x="24" y="88" class="sub">stats / cost / errors</text>
  </g>

  <path class="line dash" d="M284 202 C330 202 340 240 384 260"/>
  <path class="line dash" d="M284 420 C334 420 338 366 384 346"/>
  <path class="line dash" d="M736 246 C790 216 800 170 850 168"/>
  <path class="line dash" d="M736 320 C792 320 800 342 850 348"/>
  <path class="line dash" d="M736 396 C792 438 808 508 850 518"/>
</svg>
